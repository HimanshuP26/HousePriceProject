<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>House Price Prediction</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <style>

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
        }

        .card {
            border-radius: 15px;
            padding: 30px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .title {
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .btn-custom {
            width: 100%;
            border-radius: 10px;
        }

        .result {
            text-align: center;
            font-weight: bold;
            color: green;
            margin-top: 15px;
            font-size: 20px;
        }

    </style>

</head>

<body>

<div class="card bg-white">

    <h2 class="title">House Price Prediction</h2>

    <form action="/predict" method="post">

        <div class="mb-3">
            <label>Area (sq ft)</label>
            <input type="number" name="area" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Bedrooms</label>
            <input type="number" name="bedrooms" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Bathrooms</label>
            <input type="number" name="bathrooms" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary btn-custom">
            Predict Price
        </button>

    </form>

    {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
    {% endif %}

</div>

</body>
</html>
